name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repo (latest version)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node (latest version that supports Node 24)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # your app runtime, NOT the action runtime

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build Angular app
      - name: Build Angular app
        run: npm run build -- --configuration production --base-href /

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/personal-website
          # For a user site, the gh-pages branch is used automatically
          # The Action will create/update gh-pages branch for you
